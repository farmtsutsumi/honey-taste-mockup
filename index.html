<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Honey Taste 🐝</title>
<style>
  :root {
    --honey: #f5b800;
    --honey-deep: #d99700;
    --honey-light: #fff4d1;
    --ink: #1a1410;
    --paper: #fffaf0;
    --line: #ebe2cb;
    --muted: #8a7a65;
    --ok: #2e9d6a;
    --bad: #c8453d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--paper);
    color: var(--ink);
    overscroll-behavior: none;
    font-size: 15px;
    line-height: 1.5;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--paper);
    position: relative;
  }
  .top {
    padding: 18px 20px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .top .back {
    background: none; border: none; color: var(--honey-deep);
    font-size: 16px; cursor: pointer; padding: 4px;
  }
  .top .who {
    color: var(--muted); font-size: 12px;
    background: #fff; border: 1px solid var(--line);
    padding: 4px 10px; border-radius: 12px; cursor: pointer;
  }
  .page { padding: 12px 20px 80px; }
  h1 { font-size: 24px; margin: 8px 0 4px; font-weight: 700; }
  h2 { font-size: 14px; color: var(--muted); margin: 24px 0 10px; font-weight: 600; letter-spacing: 0.05em; }
  .lead { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  /* big number hero */
  .hero {
    background: linear-gradient(135deg, var(--honey) 0%, var(--honey-deep) 100%);
    color: var(--ink);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 18px;
    text-align: center;
  }
  .hero .lbl { font-size: 12px; opacity: 0.7; letter-spacing: 0.1em; }
  .hero .big { font-size: 40px; font-weight: 800; margin: 8px 0; letter-spacing: -0.02em; }
  .hero .sub { font-size: 12px; opacity: 0.8; }

  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  .row:last-child { border-bottom: none; }
  .row .name { font-weight: 600; }
  .row .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .row .right { text-align: right; }
  .row .amt { font-weight: 700; font-size: 16px; }
  .row.click { cursor: pointer; }
  .row.click:active { background: #faf3e0; }

  .btn {
    display: block;
    width: 100%;
    background: var(--honey);
    color: var(--ink);
    border: none;
    padding: 18px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 16px;
    margin-top: 12px;
    cursor: pointer;
  }
  .btn:active { transform: scale(0.98); }
  .btn.ghost {
    background: #fff;
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn.dark {
    background: var(--ink);
    color: var(--honey);
  }
  .btn.danger {
    background: #fadcd9;
    color: var(--bad);
  }
  .btn.small {
    padding: 10px 16px;
    font-size: 13px;
    width: auto;
    display: inline-block;
  }

  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge.ok { background: #e0f3e8; color: var(--ok); }
  .badge.wait { background: #fde9d8; color: #d96b3a; }
  .badge.honey { background: var(--honey-light); color: var(--honey-deep); }

  label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; font-weight: 600; }
  input, textarea, select {
    width: 100%;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    font-size: 16px;
    background: #fff;
    font-family: inherit;
  }
  input:focus, textarea:focus, select:focus { outline: 2px solid var(--honey); border-color: var(--honey); }
  textarea { min-height: 70px; resize: vertical; }

  /* login */
  .login {
    min-height: 100vh;
    background: linear-gradient(180deg, #2a1f15 0%, #0f0a06 100%);
    color: #fff;
    padding: 80px 24px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .login h1 { color: var(--honey); font-size: 32px; margin: 0 0 4px; }
  .login .tag { color: #b8a890; font-size: 11px; letter-spacing: 0.3em; margin-bottom: 50px; }
  .login .card-pick {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(245,184,0,0.3);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 14px;
    cursor: pointer;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .login .card-pick:active { background: rgba(245,184,0,0.12); }
  .login .card-pick .ico { font-size: 36px; }
  .login .card-pick .ttl { color: var(--honey); font-weight: 700; font-size: 17px; }
  .login .card-pick .desc { color: #b8a890; font-size: 12px; margin-top: 3px; }

  /* kiosk */
  .kiosk {
    min-height: 100vh;
    background: linear-gradient(180deg, #2a1f15 0%, #0f0a06 100%);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 24px;
    text-align: center;
    position: relative;
  }
  .kiosk-exit {
    position: absolute; top: 14px; right: 14px;
    color: rgba(255,255,255,0.4);
    background: none; border: 1px solid rgba(255,255,255,0.2);
    padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer;
  }
  .kiosk .logo { font-size: 36px; }
  .kiosk .store { color: var(--honey); font-size: 13px; letter-spacing: 0.2em; margin-bottom: 28px; }
  .kiosk .clock { font-size: 64px; font-weight: 200; line-height: 1; letter-spacing: 0.02em; }
  .kiosk .date { font-size: 13px; color: #b8a890; margin-bottom: 36px; }
  .felica {
    width: 240px; height: 240px;
    border-radius: 50%;
    border: 2px dashed var(--honey);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    color: var(--honey);
    cursor: pointer;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.04); opacity: 0.7; }
  }
  .felica .ico { font-size: 80px; }
  .felica .txt { font-size: 13px; margin-top: 6px; letter-spacing: 0.15em; }
  .kiosk .hint { color: #b8a890; font-size: 12px; margin-top: 16px; }

  .kiosk-done {
    background: rgba(245,184,0,0.08);
    border: 1px solid var(--honey);
    border-radius: 18px;
    padding: 32px 24px;
    width: 100%;
    max-width: 340px;
    margin-top: 30px;
  }
  .kiosk-done .check {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: var(--honey);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 52px;
    margin: 0 auto 18px;
  }
  .kiosk-done h2 { font-size: 24px; color: #fff; margin: 0 0 6px; text-align: center; }
  .kiosk-done .name { color: var(--honey); font-size: 17px; text-align: center; margin-bottom: 18px; }
  .kiosk-done .line {
    display: flex; justify-content: space-between;
    padding: 8px 0; font-size: 14px;
    border-top: 1px solid rgba(245,184,0,0.15);
  }
  .kiosk-done .line .k { color: #b8a890; }
  .kiosk-done .line .v { color: #fff; font-weight: 600; }

  /* approval */
  .approval {
    background: #fff;
    border: 1px solid var(--line);
    border-left: 4px solid #d96b3a;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .approval.done { border-left-color: var(--ok); opacity: 0.7; }
  .approval .top-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .approval .who { font-weight: 700; font-size: 15px; }
  .approval .amt { font-weight: 700; color: var(--honey-deep); font-size: 18px; }
  .approval .reason { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .approval .btns { display: flex; gap: 8px; }
  .approval .btns button {
    flex: 1; padding: 12px; border: none; border-radius: 10px;
    font-weight: 700; font-size: 14px; cursor: pointer;
  }
  .approval .ok-btn { background: var(--honey); color: var(--ink); }
  .approval .no-btn { background: #f0e8d4; color: var(--ink); }

  /* modal */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .modal {
    background: var(--paper);
    width: 100%; max-width: 480px;
    border-radius: 20px 20px 0 0;
    padding: 24px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal h3 { margin: 0 0 16px; font-size: 18px; }
  .picker { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 16px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .picker:active { background: #faf3e0; }
  .picker .who-info .nm { font-weight: 700; }
  .picker .who-info .mt { font-size: 11px; color: var(--muted); }

  .toast {
    position: fixed; bottom: 40px; left: 50%;
    transform: translateX(-50%);
    background: var(--ink); color: #fff;
    padding: 14px 22px; border-radius: 24px;
    font-size: 14px; z-index: 200;
  }

  .empty {
    text-align: center; padding: 40px 20px;
    color: var(--muted); font-size: 13px;
  }
  .empty .ico { font-size: 40px; display: block; margin-bottom: 10px; opacity: 0.4; }
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-host"></div>
<div id="toast-host"></div>

<script>
/* ============ DATA ============ */
const KEY = 'honeytaste_simple_v1';

function seed() {
  const today = new Date();
  const stores = [
    { id: 's1', name: 'Honey Taste' },
    { id: 's2', name: 'Bar Mitsu' },
    { id: 's3', name: 'Esthe Lumi' },
  ];
  const staff = [
    { id: 'u1', name: 'あおい', storeId: 's1', wage: 2400 },
    { id: 'u2', name: 'れな',   storeId: 's1', wage: 2800 },
    { id: 'u3', name: 'みお',   storeId: 's1', wage: 2200 },
    { id: 'u4', name: 'さくら', storeId: 's1', wage: 2200 },
    { id: 'u5', name: 'ゆい',   storeId: 's1', wage: 2600 },
    { id: 'u6', name: 'ケンジ', storeId: 's2', wage: 1800 },
    { id: 'u7', name: 'ユウタ', storeId: 's2', wage: 1800 },
    { id: 'u8', name: 'ナナミ', storeId: 's3', wage: 1700 },
    { id: 'u9', name: 'リサ',   storeId: 's3', wage: 1700 },
  ];
  const punches = [];
  let pid = 1;
  for (let off = -18; off <= 0; off++) {
    const d = new Date(today); d.setDate(d.getDate() + off);
    staff.forEach(s => {
      const seed = (s.id.charCodeAt(1) + d.getDay()) % 7;
      if (seed < 2) return;
      const ci = new Date(d); ci.setHours(s.storeId === 's3' ? 13 : 21, 15, 0, 0);
      const co = new Date(d); co.setHours(s.storeId === 's3' ? 19 : (21 + 5 + (seed%2)) % 24, 30, 0, 0);
      if (s.storeId !== 's3') co.setDate(co.getDate()+1);
      if (off === 0) {
        if (s.id === 'u1' || s.id === 'u3' || s.id === 'u6') {
          punches.push({ id:'p'+(pid++), staffId:s.id, storeId:s.storeId, clockIn:ci.toISOString(), clockOut:null });
        }
      } else {
        punches.push({ id:'p'+(pid++), staffId:s.id, storeId:s.storeId, clockIn:ci.toISOString(), clockOut:co.toISOString() });
      }
    });
  }
  const advances = [
    { id:'a1', staffId:'u1', amount:30000, reason:'家賃支払いのため', status:'pending', at: new Date(Date.now()-3600000*5).toISOString() },
    { id:'a2', staffId:'u2', amount:50000, reason:'帰省費用',         status:'pending', at: new Date(Date.now()-3600000*2).toISOString() },
    { id:'a3', staffId:'u6', amount:20000, reason:'友人結婚式',       status:'pending', at: new Date(Date.now()-3600000*1).toISOString() },
    { id:'a0', staffId:'u2', amount:20000, reason:'前月分',           status:'approved', at: new Date(Date.now()-86400000*10).toISOString() },
  ];
  return { stores, staff, punches, advances };
}

let db = (() => {
  try { return JSON.parse(localStorage.getItem(KEY)) || (() => { const s = seed(); localStorage.setItem(KEY, JSON.stringify(s)); return s; })(); }
  catch (e) { const s = seed(); localStorage.setItem(KEY, JSON.stringify(s)); return s; }
})();
function save() { localStorage.setItem(KEY, JSON.stringify(db)); }
function resetData() { localStorage.removeItem(KEY); db = seed(); save(); }

const SKEY = 'honeytaste_simple_session';
let session = JSON.parse(sessionStorage.getItem(SKEY) || 'null');
function setSession(s) { session = s; sessionStorage.setItem(SKEY, JSON.stringify(s)); }
function logout() { sessionStorage.removeItem(SKEY); session = null; render(); }

/* ============ HELPERS ============ */
const yen = n => '¥' + Math.round(n).toLocaleString();
const pad = n => String(n).padStart(2,'0');
const fmtTime = d => pad(d.getHours()) + ':' + pad(d.getMinutes());
const fmtDateLong = d => `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;
const dowNames = ['日','月','火','水','木','金','土'];
const todayISO = () => new Date().toISOString().slice(0,10);
const thisMonth = () => new Date().toISOString().slice(0,7);
const staffById = id => db.staff.find(s => s.id === id);
const storeById = id => db.stores.find(s => s.id === id);
const activePunch = sid => db.punches.find(p => p.staffId === sid && !p.clockOut);

function calcMonth(staffId, ymStr) {
  const s = staffById(staffId);
  const punches = db.punches.filter(p => p.staffId === staffId && p.clockIn.slice(0,7) === ymStr && p.clockOut);
  let hours = 0;
  punches.forEach(p => { hours += (new Date(p.clockOut) - new Date(p.clockIn)) / 3600000; });
  const base = hours * s.wage;
  const adv = db.advances
    .filter(a => a.staffId === staffId && a.status === 'approved' && a.at.slice(0,7) === ymStr)
    .reduce((sum, a) => sum + a.amount, 0);
  return { hours, days: punches.length, base, adv, net: base - adv };
}

function toast(msg) {
  const host = document.getElementById('toast-host');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}
function modal(html) {
  document.getElementById('modal-host').innerHTML = `<div class="modal-bg" data-mclose><div class="modal">${html}</div></div>`;
  document.querySelector('[data-mclose]').onclick = e => { if (e.target.hasAttribute('data-mclose')) closeModal(); };
  bind();
}
function closeModal() { document.getElementById('modal-host').innerHTML = ''; }

/* ============ RENDER ============ */
function render() {
  const app = document.getElementById('app');
  if (!session) { app.innerHTML = viewLogin(); bind(); return; }
  if (session.view === 'kiosk') { app.innerHTML = viewKiosk(); startClock(); bind(); return; }
  if (session.view === 'kioskDone') { app.innerHTML = viewKioskDone(); bind(); return; }

  const me = staffById(session.userId);
  const role = me && me.id === 'owner' ? 'owner' : 'staff';

  let body = '';
  const v = session.view;
  if (role === 'owner') {
    if (v === 'approvals') body = viewApprovals();
    else if (v === 'payroll') body = viewPayroll();
    else body = viewOwnerHome();
  } else {
    if (v === 'advance') body = viewStaffAdvance(me);
    else body = viewStaffHome(me);
  }

  const isHome = !v || v === 'home';
  app.innerHTML = `
    <div class="top">
      ${!isHome ? '<button class="back" data-act="back">‹ 戻る</button>' : '<div style="width:40px"></div>'}
      <button class="who" data-act="switch">${me ? me.name : 'ゲスト'} ▾</button>
    </div>
    ${body}
  `;
  bind();
}

/* ============ LOGIN ============ */
function viewLogin() {
  return `
    <div class="login">
      <h1>🐝 Honey Taste</h1>
      <div class="tag">勤怠 ・ 給与</div>

      <div class="card-pick" data-act="loginOwner">
        <div class="ico">👑</div>
        <div><div class="ttl">オーナー</div><div class="desc">承認・給与確定</div></div>
      </div>
      <div class="card-pick" data-act="pickStaff">
        <div class="ico">👤</div>
        <div><div class="ttl">スタッフ</div><div class="desc">自分のシフト・給与</div></div>
      </div>
      <div class="card-pick" data-act="openKiosk" style="border-color:rgba(245,184,0,0.6);background:rgba(245,184,0,0.08)">
        <div class="ico">📱</div>
        <div><div class="ttl">打刻端末</div><div class="desc">店舗の共用iPad</div></div>
      </div>

      <div style="margin-top:30px;font-size:11px;color:rgba(255,255,255,0.3);text-align:center">
        <button style="background:none;color:var(--honey);border:1px solid rgba(245,184,0,0.4);padding:6px 12px;border-radius:8px;font-size:11px;cursor:pointer" data-act="reset">データ初期化</button>
      </div>
    </div>
  `;
}

/* ============ KIOSK ============ */
function viewKiosk() {
  const store = storeById(session.params.storeId);
  const now = new Date();
  return `
    <button class="kiosk-exit" data-act="logout">× 終了</button>
    <div class="kiosk">
      <div class="logo">🐝</div>
      <div class="store">${store.name.toUpperCase()}</div>
      <div class="clock" id="clk">${fmtTime(now)}</div>
      <div class="date">${fmtDateLong(now)} (${dowNames[now.getDay()]})</div>

      <div class="felica" data-act="tap">
        <div class="ico">📱</div>
        <div class="txt">TOUCH</div>
      </div>
      <div class="hint">交通系IC・社員証をタッチ</div>

      <div style="margin-top:36px">
        <select id="ks-store" style="background:transparent;color:var(--honey);border:1px solid rgba(245,184,0,0.3);padding:8px;border-radius:8px;font-size:12px">
          ${db.stores.map(s => `<option value="${s.id}" ${s.id===store.id?'selected':''}>${s.name}</option>`).join('')}
        </select>
      </div>
    </div>
  `;
}
function viewKioskDone() {
  const { staffId, action, punch, storeId } = session.params;
  const s = staffById(staffId);
  const store = storeById(storeId);
  const m = calcMonth(staffId, thisMonth());
  const isOut = action === 'out';
  return `
    <div class="kiosk">
      <div class="logo">🐝</div>
      <div class="kiosk-done">
        <div class="check">${isOut ? '👋' : '✓'}</div>
        <h2>${isOut ? 'おつかれさま' : 'いってらっしゃい'}</h2>
        <div class="name">${s.name} さん</div>
        <div class="line"><span class="k">${isOut ? '退勤' : '出勤'}</span><span class="v">${fmtTime(new Date(isOut ? punch.clockOut : punch.clockIn))}</span></div>
        ${isOut ? `<div class="line"><span class="k">本日の勤務</span><span class="v">${((new Date(punch.clockOut) - new Date(punch.clockIn))/3600000).toFixed(1)} 時間</span></div>` : ''}
        <div class="line"><span class="k">今月の出勤</span><span class="v">${m.days} 日 / ${m.hours.toFixed(1)} 時間</span></div>
        <div class="line"><span class="k">今月の見込み</span><span class="v">${yen(m.net)}</span></div>
      </div>
    </div>
  `;
}

/* ============ OWNER ============ */
function viewOwnerHome() {
  const ym = thisMonth();
  const today = todayISO();
  const allStaff = db.staff;
  const totalPay = allStaff.reduce((sum, s) => sum + calcMonth(s.id, ym).net, 0);
  const active = db.punches.filter(p => !p.clockOut).length;
  const pending = db.advances.filter(a => a.status === 'pending').length;

  return `
    <div class="page">
      <h1>こんばんは</h1>
      <div class="lead">${today.slice(5)} (${dowNames[new Date().getDay()]}) の状況です</div>

      <div class="hero">
        <div class="lbl">今月の人件費 見込み</div>
        <div class="big">${yen(totalPay)}</div>
        <div class="sub">スタッフ ${allStaff.length}名 ・ 前借り相殺後</div>
      </div>

      ${pending > 0 ? `<div class="card" style="background:var(--honey-light);border-color:var(--honey)" data-act="go" data-v="approvals">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:700;font-size:15px">前借り承認</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">${pending}件 待っています</div>
          </div>
          <div style="color:var(--honey-deep);font-size:20px">›</div>
        </div>
      </div>` : ''}

      <h2>今 働いている人</h2>
      ${active === 0 ? '<div class="card"><div class="empty"><span class="ico">😴</span>まだ誰も出勤していません</div></div>' : `
        <div class="card">${db.punches.filter(p => !p.clockOut).map(p => {
          const s = staffById(p.staffId); const st = storeById(p.storeId);
          const ci = new Date(p.clockIn);
          return `<div class="row">
            <div><div class="name">${s.name}</div><div class="meta">${st.name} ・ ${fmtTime(ci)} 出勤</div></div>
            <span class="badge ok">勤務中</span>
          </div>`;
        }).join('')}</div>
      `}

      <h2>月末の振込</h2>
      <div class="card" data-act="go" data-v="payroll" style="cursor:pointer">
        <div class="row">
          <div><div class="name">${ym} の給与一覧</div><div class="meta">CSVダウンロード・LINE送付</div></div>
          <div style="color:var(--muted)">›</div>
        </div>
      </div>
    </div>
  `;
}

function viewApprovals() {
  const list = db.advances.filter(a => a.status === 'pending').sort((a,b) => new Date(b.at) - new Date(a.at));
  const done = db.advances.filter(a => a.status !== 'pending').sort((a,b) => new Date(b.at) - new Date(a.at)).slice(0,5);

  return `
    <div class="page">
      <h1>前借り承認</h1>
      <div class="lead">${list.length}件 待っています</div>

      ${list.length === 0 ? '<div class="card"><div class="empty"><span class="ico">✓</span>承認待ちはありません</div></div>' :
        list.map(a => {
          const s = staffById(a.staffId); const st = storeById(s.storeId);
          const m = calcMonth(s.id, thisMonth());
          return `
            <div class="approval">
              <div class="top-row">
                <div class="who">${s.name} <span style="color:var(--muted);font-size:11px;font-weight:400">${st.name}</span></div>
                <div class="amt">${yen(a.amount)}</div>
              </div>
              <div class="reason">${a.reason}</div>
              <div style="font-size:11px;color:var(--muted);margin-bottom:12px">今月見込 ${yen(m.net)}</div>
              <div class="btns">
                <button class="no-btn" data-act="adv" data-id="${a.id}" data-do="reject">却下</button>
                <button class="ok-btn" data-act="adv" data-id="${a.id}" data-do="approve">承認する</button>
              </div>
            </div>
          `;
        }).join('')}

      ${done.length > 0 ? `
        <h2>最近の承認履歴</h2>
        ${done.map(a => {
          const s = staffById(a.staffId);
          return `<div class="approval done">
            <div class="top-row"><div class="who">${s.name}</div><div class="amt">${yen(a.amount)}</div></div>
            <div class="reason">${a.reason}</div>
            <span class="badge ${a.status==='approved'?'ok':''}" style="background:${a.status==='approved'?'#e0f3e8':'#fadcd9'};color:${a.status==='approved'?'var(--ok)':'var(--bad)'}">${a.status==='approved'?'承認済':'却下'}</span>
          </div>`;
        }).join('')}
      ` : ''}
    </div>
  `;
}

function viewPayroll() {
  const ym = thisMonth();
  const rows = db.staff.map(s => ({ s, m: calcMonth(s.id, ym) })).sort((a,b) => b.m.net - a.m.net);
  const total = rows.reduce((sum, r) => sum + r.m.net, 0);

  return `
    <div class="page">
      <h1>月末締め</h1>
      <div class="lead">${ym} の支給予定</div>

      <div class="hero">
        <div class="lbl">合計</div>
        <div class="big">${yen(total)}</div>
        <div class="sub">${rows.length}名 ・ 振込CSVですぐ出せます</div>
      </div>

      <div class="card">
        ${db.stores.map(st => {
          const stRows = rows.filter(r => r.s.storeId === st.id);
          if (stRows.length === 0) return '';
          return `
            <div style="font-size:11px;color:var(--muted);font-weight:600;letter-spacing:0.05em;margin:6px 0">${st.name.toUpperCase()}</div>
            ${stRows.map(({s, m}) => `
              <div class="row">
                <div><div class="name">${s.name}</div><div class="meta">${m.hours.toFixed(1)}h${m.adv ? ' ・ 前借 '+yen(m.adv) : ''}</div></div>
                <div class="right"><div class="amt">${yen(m.net)}</div></div>
              </div>
            `).join('')}
          `;
        }).join('')}
      </div>

      <button class="btn" data-act="csv">振込用CSVをダウンロード</button>
      <button class="btn ghost" data-act="line">明細をLINEで送る</button>
    </div>
  `;
}

/* ============ STAFF ============ */
function viewStaffHome(me) {
  const ym = thisMonth();
  const m = calcMonth(me.id, ym);
  const store = storeById(me.storeId);
  const active = activePunch(me.id);

  return `
    <div class="page">
      <h1>こんにちは ${me.name}さん</h1>
      <div class="lead">${store.name}</div>

      ${active ? `<div class="card" style="background:linear-gradient(135deg,var(--ok),#247952);color:#fff;border:none">
        <div style="font-size:12px;opacity:0.8">勤務中</div>
        <div style="font-size:22px;font-weight:700;margin:6px 0">${fmtTime(new Date(active.clockIn))} 出勤</div>
        <div style="font-size:12px;opacity:0.8">経過 ${((Date.now() - new Date(active.clockIn))/3600000).toFixed(1)} 時間</div>
      </div>` : ''}

      <div class="hero">
        <div class="lbl">今月の見込み</div>
        <div class="big">${yen(m.net)}</div>
        <div class="sub">${m.days}日 / ${m.hours.toFixed(1)}時間 ${m.adv ? '・ 前借 '+yen(m.adv) : ''}</div>
      </div>

      <button class="btn" data-act="go" data-v="advance">前借りを申請する</button>
    </div>
  `;
}

function viewStaffAdvance(me) {
  const mine = db.advances.filter(a => a.staffId === me.id).sort((a,b) => new Date(b.at) - new Date(a.at));
  return `
    <div class="page">
      <h1>前借り</h1>
      <div class="lead">オーナーの承認が必要です</div>

      <div class="card">
        <label>金額</label>
        <input id="adv-a" type="number" placeholder="例: 30000" inputmode="numeric">
        <label>理由</label>
        <textarea id="adv-r" placeholder="例: 家賃支払いのため"></textarea>
        <button class="btn" data-act="submitAdv">申請する</button>
      </div>

      ${mine.length > 0 ? `
        <h2>これまでの申請</h2>
        <div class="card">${mine.map(a => `<div class="row">
          <div><div class="name">${yen(a.amount)}</div><div class="meta">${a.reason}</div></div>
          <span class="badge ${a.status==='approved'?'ok':a.status==='rejected'?'':'wait'}" style="${a.status==='rejected'?'background:#fadcd9;color:var(--bad)':''}">${a.status==='approved'?'承認':a.status==='rejected'?'却下':'待ち'}</span>
        </div>`).join('')}</div>
      ` : ''}
    </div>
  `;
}

/* ============ ACTIONS ============ */
function bind() {
  document.querySelectorAll('[data-act]').forEach(el => {
    el.onclick = e => { e.stopPropagation(); handle(el.dataset.act, el.dataset, el); };
  });
  const kss = document.getElementById('ks-store');
  if (kss) kss.onchange = () => { session.params.storeId = kss.value; setSession(session); render(); };
}

function handle(act, d) {
  switch (act) {
    case 'loginOwner':
      setSession({ userId: 'owner', view: 'home' });
      render(); break;
    case 'pickStaff':
      modal(`<h3>誰でログインする？</h3>` + db.staff.map(s => `
        <div class="picker" data-act="login" data-uid="${s.id}">
          <div class="who-info"><div class="nm">${s.name}</div><div class="mt">${storeById(s.storeId).name}</div></div><div>›</div>
        </div>`).join(''));
      break;
    case 'login':
      closeModal();
      setSession({ userId: d.uid, view: 'home' });
      render(); break;
    case 'openKiosk':
      setSession({ userId: null, view: 'kiosk', params: { storeId: db.stores[0].id } });
      render(); break;
    case 'logout':
      stopClock(); closeModal(); logout(); break;
    case 'switch':
      modal(`<h3>切り替え（デモ）</h3>
        <div class="picker" data-act="loginOwner"><div class="who-info"><div class="nm">👑 オーナー</div></div><div>›</div></div>
        ${db.staff.map(s => `<div class="picker" data-act="login" data-uid="${s.id}">
          <div class="who-info"><div class="nm">${s.name}</div><div class="mt">${storeById(s.storeId).name}</div></div><div>›</div>
        </div>`).join('')}
        <div class="picker" data-act="logout"><div class="who-info"><div class="nm">🚪 ログアウト</div></div><div>›</div></div>
      `);
      break;
    case 'back':
      session.view = 'home'; setSession(session); render(); break;
    case 'go':
      session.view = d.v; setSession(session); render(); break;
    case 'reset':
      if (confirm('全データを初期化します。よろしいですか？')) { resetData(); toast('初期化しました'); }
      break;

    /* kiosk */
    case 'tap': {
      const sid = session.params.storeId;
      const candidates = db.staff.filter(s => s.storeId === sid);
      modal(`<h3>📱 タッチされたカード</h3>
        <div style="font-size:12px;color:var(--muted);margin-bottom:12px">（デモなので選んでください）</div>
        ${candidates.map(s => `<div class="picker" data-act="punch" data-sid="${s.id}">
          <div class="who-info"><div class="nm">${s.name}</div></div><div>›</div>
        </div>`).join('')}`);
      break;
    }
    case 'punch': {
      closeModal();
      const sid = d.sid;
      const storeId = session.params.storeId;
      const active = activePunch(sid);
      let punch, action;
      if (active) { active.clockOut = new Date().toISOString(); punch = active; action = 'out'; }
      else { punch = { id:'p'+Date.now(), staffId: sid, storeId, clockIn: new Date().toISOString(), clockOut: null }; db.punches.push(punch); action = 'in'; }
      save();
      session.view = 'kioskDone';
      session.params = { staffId: sid, action, punch, storeId };
      setSession(session);
      render();
      setTimeout(() => {
        if (session && session.view === 'kioskDone') {
          session.view = 'kiosk'; session.params = { storeId }; setSession(session);
          render();
        }
      }, 4000);
      break;
    }

    /* approval */
    case 'adv': {
      const a = db.advances.find(x => x.id === d.id);
      a.status = d.do === 'approve' ? 'approved' : 'rejected';
      save();
      toast(d.do === 'approve' ? '承認しました' : '却下しました');
      render();
      break;
    }

    /* advance request */
    case 'submitAdv': {
      const amt = parseInt(document.getElementById('adv-a').value);
      const r = document.getElementById('adv-r').value.trim();
      if (!amt || !r) { toast('金額と理由を入力'); return; }
      db.advances.push({ id:'a'+Date.now(), staffId: session.userId, amount: amt, reason: r, status:'pending', at: new Date().toISOString() });
      save(); toast('オーナーに送りました'); render();
      break;
    }

    /* CSV */
    case 'csv': {
      const ym = thisMonth();
      const rows = [['店舗','氏名','勤務時間','基本給','前借相殺','支給額']];
      db.staff.forEach(s => {
        const m = calcMonth(s.id, ym);
        rows.push([storeById(s.storeId).name, s.name, m.hours.toFixed(2), Math.round(m.base), m.adv, Math.round(m.net)]);
      });
      const csv = '﻿' + rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `honeytaste_${ym}.csv`; a.click();
      URL.revokeObjectURL(url);
      toast('CSVをダウンロードしました');
      break;
    }
    case 'line':
      toast('LINEで一括送信しました (デモ)'); break;
  }
}

/* ============ CLOCK ============ */
let clockT = null;
function startClock() { stopClock(); clockT = setInterval(() => { const el = document.getElementById('clk'); if (el) el.textContent = fmtTime(new Date()); }, 1000); }
function stopClock() { if (clockT) { clearInterval(clockT); clockT = null; } }

if (session && session.view === 'kiosk') startClock();

/* db owner sentinel */
if (!staffById('owner')) {
  db.staff.unshift({ id: 'owner', name: 'オーナー', storeId: null, wage: 0 });
  save();
}

render();
</script>
</body>
</html>
