<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Honey Taste 🐝</title>
<style>
  :root {
    --honey: #f5b800;
    --honey-deep: #d99700;
    --honey-light: #fff4d1;
    --ink: #1a1410;
    --paper: #fffaf0;
    --line: #ebe2cb;
    --muted: #8a7a65;
    --ok: #2e9d6a;
    --bad: #c8453d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--paper);
    color: var(--ink);
    overscroll-behavior: none;
    font-size: 15px;
    line-height: 1.5;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--paper);
    position: relative;
  }
  .top {
    padding: 18px 20px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .top .back {
    background: none; border: none; color: var(--honey-deep);
    font-size: 16px; cursor: pointer; padding: 4px;
  }
  .top .who {
    color: var(--honey-deep); font-size: 13px; font-weight: 700;
    background: var(--honey-light); border: 1px solid var(--honey);
    padding: 6px 12px; border-radius: 14px; cursor: pointer;
  }
  .top .home-btn {
    background: none; border: none; color: var(--honey-deep);
    font-size: 20px; cursor: pointer; padding: 4px 8px;
  }
  .page { padding: 12px 20px 80px; }
  h1 { font-size: 24px; margin: 8px 0 4px; font-weight: 700; }
  h2 { font-size: 14px; color: var(--muted); margin: 24px 0 10px; font-weight: 600; letter-spacing: 0.05em; }
  .lead { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  /* big number hero */
  .hero {
    background: linear-gradient(135deg, var(--honey) 0%, var(--honey-deep) 100%);
    color: var(--ink);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 18px;
    text-align: center;
  }
  .hero .lbl { font-size: 12px; opacity: 0.7; letter-spacing: 0.1em; }
  .hero .big { font-size: 40px; font-weight: 800; margin: 8px 0; letter-spacing: -0.02em; }
  .hero .sub { font-size: 12px; opacity: 0.8; }

  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  .row:last-child { border-bottom: none; }
  .row .name { font-weight: 600; }
  .row .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .row .right { text-align: right; }
  .row .amt { font-weight: 700; font-size: 16px; }
  .row.click { cursor: pointer; }
  .row.click:active { background: #faf3e0; }

  .btn {
    display: block;
    width: 100%;
    background: var(--honey);
    color: var(--ink);
    border: none;
    padding: 18px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 16px;
    margin-top: 12px;
    cursor: pointer;
  }
  .btn:active { transform: scale(0.98); }
  .btn.ghost {
    background: #fff;
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn.dark {
    background: var(--ink);
    color: var(--honey);
  }
  .btn.danger {
    background: #fadcd9;
    color: var(--bad);
  }
  .btn.small {
    padding: 10px 16px;
    font-size: 13px;
    width: auto;
    display: inline-block;
  }

  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge.ok { background: #e0f3e8; color: var(--ok); }
  .badge.wait { background: #fde9d8; color: #d96b3a; }
  .badge.honey { background: var(--honey-light); color: var(--honey-deep); }

  label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; font-weight: 600; }
  input, textarea, select {
    width: 100%;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    font-size: 16px;
    background: #fff;
    font-family: inherit;
  }
  input:focus, textarea:focus, select:focus { outline: 2px solid var(--honey); border-color: var(--honey); }
  textarea { min-height: 70px; resize: vertical; }

  /* login */
  .login {
    min-height: 100vh;
    background: linear-gradient(180deg, #fff4d1 0%, #f5b800 60%, #d99700 100%);
    color: var(--ink);
    padding: 80px 24px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .login h1 { color: var(--ink); font-size: 36px; margin: 0 0 4px; }
  .login .tag { color: var(--ink-soft, #3a2f25); opacity: 0.6; font-size: 11px; letter-spacing: 0.3em; margin-bottom: 50px; }
  .login .card-pick {
    width: 100%;
    background: rgba(255,255,255,0.85);
    border: 1px solid rgba(26,20,16,0.1);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 14px;
    cursor: pointer;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
  }
  .login .card-pick:active { background: #fff; }
  .login .card-pick .ico { font-size: 36px; }
  .login .card-pick .ttl { color: var(--ink); font-weight: 700; font-size: 17px; }
  .login .card-pick .desc { color: var(--muted); font-size: 12px; margin-top: 3px; }

  /* kiosk */
  .kiosk {
    min-height: 100vh;
    background: linear-gradient(180deg, #2a1f15 0%, #0f0a06 100%);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 24px;
    text-align: center;
    position: relative;
  }
  .kiosk-exit {
    position: absolute; top: 16px; right: 16px;
    color: var(--ink);
    background: var(--honey); border: none;
    padding: 10px 16px; border-radius: 22px; font-size: 13px; font-weight: 700; cursor: pointer;
    z-index: 10;
  }
  .kiosk-exit:active { opacity: 0.7; }
  .kiosk .logo { font-size: 36px; }
  .kiosk .store { color: var(--honey); font-size: 13px; letter-spacing: 0.2em; margin-bottom: 28px; }
  .kiosk .clock { font-size: 64px; font-weight: 200; line-height: 1; letter-spacing: 0.02em; }
  .kiosk .date { font-size: 13px; color: #b8a890; margin-bottom: 36px; }
  .felica {
    width: 240px; height: 240px;
    border-radius: 50%;
    border: 2px dashed var(--honey);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    color: var(--honey);
    cursor: pointer;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.04); opacity: 0.7; }
  }
  .felica .ico { font-size: 80px; }
  .felica .txt { font-size: 13px; margin-top: 6px; letter-spacing: 0.15em; }
  .kiosk .hint { color: #b8a890; font-size: 12px; margin-top: 16px; }

  .kiosk-done {
    background: rgba(245,184,0,0.08);
    border: 1px solid var(--honey);
    border-radius: 18px;
    padding: 32px 24px;
    width: 100%;
    max-width: 340px;
    margin-top: 30px;
  }
  .kiosk-done .check {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: var(--honey);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 52px;
    margin: 0 auto 18px;
  }
  .kiosk-done h2 { font-size: 24px; color: #fff; margin: 0 0 6px; text-align: center; }
  .kiosk-done .name { color: var(--honey); font-size: 17px; text-align: center; margin-bottom: 18px; }
  .kiosk-done .line {
    display: flex; justify-content: space-between;
    padding: 8px 0; font-size: 14px;
    border-top: 1px solid rgba(245,184,0,0.15);
  }
  .kiosk-done .line .k { color: #b8a890; }
  .kiosk-done .line .v { color: #fff; font-weight: 600; }

  /* approval */
  .approval {
    background: #fff;
    border: 1px solid var(--line);
    border-left: 4px solid #d96b3a;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .approval.done { border-left-color: var(--ok); opacity: 0.7; }
  .approval .top-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .approval .who { font-weight: 700; font-size: 15px; }
  .approval .amt { font-weight: 700; color: var(--honey-deep); font-size: 18px; }
  .approval .reason { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .approval .btns { display: flex; gap: 8px; }
  .approval .btns button {
    flex: 1; padding: 12px; border: none; border-radius: 10px;
    font-weight: 700; font-size: 14px; cursor: pointer;
  }
  .approval .ok-btn { background: var(--honey); color: var(--ink); }
  .approval .no-btn { background: #f0e8d4; color: var(--ink); }

  /* modal */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .modal {
    background: var(--paper);
    width: 100%; max-width: 480px;
    border-radius: 20px 20px 0 0;
    padding: 24px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal h3 { margin: 0 0 16px; font-size: 18px; }
  .picker { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 16px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .picker:active { background: #faf3e0; }
  .picker .who-info .nm { font-weight: 700; }
  .picker .who-info .mt { font-size: 11px; color: var(--muted); }

  .toast {
    position: fixed; bottom: 40px; left: 50%;
    transform: translateX(-50%);
    background: var(--ink); color: #fff;
    padding: 14px 22px; border-radius: 24px;
    font-size: 14px; z-index: 200;
  }

  .empty {
    text-align: center; padding: 40px 20px;
    color: var(--muted); font-size: 13px;
  }

  .store-pills {
    display: flex; gap: 6px; overflow-x: auto;
    padding: 4px 0 14px; scrollbar-width: none;
  }
  .store-pills::-webkit-scrollbar { display: none; }
  .store-pills .pill {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 18px;
    background: #fff;
    border: 1px solid var(--line);
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
    cursor: pointer;
    font-weight: 600;
  }
  .store-pills .pill.on {
    background: var(--ink);
    color: var(--honey);
    border-color: var(--ink);
  }

  .pay-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
  }
  .pay-row:last-child { border-bottom: none; }
  .pay-row .info { flex: 1; }
  .pay-row .info .nm { font-weight: 700; font-size: 15px; }
  .pay-row .info .mt { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .pay-row .amt-col { text-align: right; }
  .pay-row .amt-col .am { font-weight: 800; font-size: 16px; }
  .check {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid var(--line);
    background: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: transparent;
    flex-shrink: 0;
  }
  .check.paid {
    background: var(--ok);
    border-color: var(--ok);
    color: #fff;
  }
  .pay-row.paid .info .nm { color: var(--muted); text-decoration: line-through; }
  .pay-row.paid .amt-col .am { color: var(--muted); }

  .shift-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -4px; }
  .shift-grid {
    display: grid;
    grid-template-columns: 76px repeat(7, minmax(44px,1fr));
    gap: 3px;
    font-size: 10px;
    min-width: 420px;
    padding: 4px;
  }
  .shift-grid .gh {
    text-align: center; color: var(--muted); padding: 4px 0;
    font-weight: 700; font-size: 11px;
  }
  .shift-grid .gh.sun { color: var(--bad); }
  .shift-grid .gh.sat { color: #4a6fa5; }
  .shift-grid .gh small { display: block; font-weight: 400; font-size: 10px; color: var(--muted); }
  .shift-grid .gname {
    padding: 6px 4px; font-size: 12px; font-weight: 600;
    display: flex; align-items: center;
  }
  .shift-grid .gcell {
    aspect-ratio: 1;
    background: #f5efe0;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 10px;
    cursor: pointer; border: none; padding: 0;
    font-weight: 600;
  }
  .shift-grid .gcell.on { background: var(--honey); color: var(--ink); }
  .shift-grid .gcell:active { transform: scale(0.94); }

  .my-shift-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid var(--line);
  }
  .my-shift-row:last-child { border-bottom: none; }
  .my-shift-row .dt { font-weight: 700; }
  .my-shift-row .hr { color: var(--honey-deep); font-weight: 700; }
  .my-shift-row.past { opacity: 0.5; }
  .empty .ico { font-size: 40px; display: block; margin-bottom: 10px; opacity: 0.4; }

  @media print {
    body { background: #fff; }
    .top, .tabbar, .btn, .store-pills, .nav { display: none !important; }
    #app { max-width: 100%; padding: 0; }
    .card { break-inside: avoid; box-shadow: none; }
    .summary-box, .hero { background: none !important; color: #000 !important; border: 2px solid #000; }
    button { display: none !important; }
  }

  .check.lg { width: 36px; height: 36px; border-width: 2px; font-size: 20px; }
  .check:hover { background: var(--honey-light); }
  .check.paid:hover { background: var(--ok); }
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-host"></div>
<div id="toast-host"></div>

<script>
/* ============ DATA ============ */
const KEY = 'honeytaste_simple_v3';
/* Clean up old keys */
try {
  ['honeytaste_simple_v1','honeytaste_simple_v2','honeytaste_v1'].forEach(k => localStorage.removeItem(k));
  ['honeytaste_simple_session','honeytaste_session_v1'].forEach(k => sessionStorage.removeItem(k));
} catch(e) {}

const ALLOWANCE_DEFS = {
  salesBack: { label: '売り上げバック', kind: 'manual' },
  dohan:     { label: '同伴手当',       kind: 'manual' },
  shampagne: { label: 'シャンパン手当', kind: 'manual' },
  shot:      { label: 'ショット手当',   kind: 'manual' },
  event:     { label: 'イベント手当',   kind: 'manual' },
  saturday:  { label: '土曜日手当',     kind: 'auto' },
};

function defaultAllowances(type) {
  if (type === 'snack') return {
    on:   { salesBack: true,  dohan: true,  shampagne: true,  shot: true,  event: true,  saturday: true  },
    rate: { saturday: 2000 },
  };
  if (type === 'bar') return {
    on:   { salesBack: false, dohan: false, shampagne: true,  shot: true,  event: true,  saturday: true  },
    rate: { saturday: 1500 },
  };
  return {
    on:   { salesBack: true,  dohan: false, shampagne: false, shot: false, event: true,  saturday: false },
    rate: { saturday: 0 },
  };
}

function seed() {
  const today = new Date();
  const stores = [
    { id: 's1', name: 'Honey Taste', type: 'snack', ...defaultAllowances('snack') },
    { id: 's2', name: 'Bar Mitsu',   type: 'bar',   ...defaultAllowances('bar') },
    { id: 's3', name: 'Esthe Lumi',  type: 'esthe', ...defaultAllowances('esthe') },
  ];
  const staff = [
    { id: 'u1', name: 'あおい', storeId: 's1', wage: 2400 },
    { id: 'u2', name: 'れな',   storeId: 's1', wage: 2800 },
    { id: 'u3', name: 'みお',   storeId: 's1', wage: 2200 },
    { id: 'u4', name: 'さくら', storeId: 's1', wage: 2200 },
    { id: 'u5', name: 'ゆい',   storeId: 's1', wage: 2600 },
    { id: 'u6', name: 'ケンジ', storeId: 's2', wage: 1800 },
    { id: 'u7', name: 'ユウタ', storeId: 's2', wage: 1800 },
    { id: 'u8', name: 'ナナミ', storeId: 's3', wage: 1700 },
    { id: 'u9', name: 'リサ',   storeId: 's3', wage: 1700 },
  ];
  const punches = [];
  let pid = 1;
  for (let off = -18; off <= 0; off++) {
    const d = new Date(today); d.setDate(d.getDate() + off);
    staff.forEach(s => {
      const seed = (s.id.charCodeAt(1) + d.getDay()) % 7;
      if (seed < 2) return;
      const ci = new Date(d); ci.setHours(s.storeId === 's3' ? 13 : 21, 15, 0, 0);
      const co = new Date(d); co.setHours(s.storeId === 's3' ? 19 : (21 + 5 + (seed%2)) % 24, 30, 0, 0);
      if (s.storeId !== 's3') co.setDate(co.getDate()+1);
      if (off === 0) {
        if (s.id === 'u1' || s.id === 'u3' || s.id === 'u6') {
          punches.push({ id:'p'+(pid++), staffId:s.id, storeId:s.storeId, clockIn:ci.toISOString(), clockOut:null });
        }
      } else {
        punches.push({ id:'p'+(pid++), staffId:s.id, storeId:s.storeId, clockIn:ci.toISOString(), clockOut:co.toISOString() });
      }
    });
  }
  const advances = [
    { id:'a1', staffId:'u1', amount:30000, reason:'家賃支払いのため', status:'pending', at: new Date(Date.now()-3600000*5).toISOString() },
    { id:'a2', staffId:'u2', amount:50000, reason:'帰省費用',         status:'pending', at: new Date(Date.now()-3600000*2).toISOString() },
    { id:'a3', staffId:'u6', amount:20000, reason:'友人結婚式',       status:'pending', at: new Date(Date.now()-3600000*1).toISOString() },
    { id:'a0', staffId:'u2', amount:20000, reason:'前月分',           status:'approved', at: new Date(Date.now()-86400000*10).toISOString(), handedOver: true },
  ];
  const payouts = []; // { id, staffId, ym, amount, paidAt }

  /* シフト: 過去〜今後14日分 */
  const shifts = [];
  let shid = 1;
  for (let off = -7; off <= 14; off++) {
    const d = new Date(today); d.setDate(d.getDate() + off);
    const ds = d.toISOString().slice(0,10);
    staff.forEach(s => {
      if (s.id === 'owner') return;
      const seed = (s.id.charCodeAt(1) + d.getDay()) % 7;
      if (seed < 2) return;
      const isEsthe = s.storeId === 's3';
      shifts.push({
        id: 'sh' + (shid++),
        staffId: s.id,
        date: ds,
        startHour: isEsthe ? (11 + (seed%3)) : (20 + (seed%2)),
        endHour:   isEsthe ? (19 + (seed%3)) : (20 + (seed%2) + 5 + (seed%2)),
      });
    });
  }

  /* 手当エントリ: { id, staffId, type, amount, date, note? } */
  const allowanceEntries = [
    { id:'al1', staffId:'u1', type:'shampagne', amount:5000, date: new Date(Date.now()-86400000*3).toISOString().slice(0,10) },
    { id:'al2', staffId:'u1', type:'dohan',     amount:3000, date: new Date(Date.now()-86400000*5).toISOString().slice(0,10) },
    { id:'al3', staffId:'u2', type:'shampagne', amount:5000, date: new Date(Date.now()-86400000*2).toISOString().slice(0,10) },
    { id:'al4', staffId:'u2', type:'salesBack', amount:24500, date: new Date(Date.now()-86400000*1).toISOString().slice(0,10) },
    { id:'al5', staffId:'u3', type:'shot',      amount:2000, date: new Date(Date.now()-86400000*4).toISOString().slice(0,10) },
  ];

  return { stores, staff, punches, advances, payouts, shifts, allowanceEntries };
}

let db = (() => {
  try { return JSON.parse(localStorage.getItem(KEY)) || (() => { const s = seed(); localStorage.setItem(KEY, JSON.stringify(s)); return s; })(); }
  catch (e) { const s = seed(); localStorage.setItem(KEY, JSON.stringify(s)); return s; }
})();
if (!db.payouts) db.payouts = [];
if (!db.allowanceEntries || db.allowanceEntries.length === 0) {
  db.allowanceEntries = [
    { id:'al1', staffId:'u1', type:'shampagne', amount:5000,  date: new Date(Date.now()-86400000*3).toISOString().slice(0,10) },
    { id:'al2', staffId:'u1', type:'dohan',     amount:3000,  date: new Date(Date.now()-86400000*5).toISOString().slice(0,10) },
    { id:'al3', staffId:'u2', type:'shampagne', amount:5000,  date: new Date(Date.now()-86400000*2).toISOString().slice(0,10) },
    { id:'al4', staffId:'u2', type:'salesBack', amount:24500, date: new Date(Date.now()-86400000*1).toISOString().slice(0,10) },
    { id:'al5', staffId:'u3', type:'shot',      amount:2000,  date: new Date(Date.now()-86400000*4).toISOString().slice(0,10) },
  ];
}
db.stores.forEach(st => {
  if (!st.on) Object.assign(st, defaultAllowances(st.type || 'snack'));
});
if (!db.shifts || db.shifts.length === 0) {
  const today = new Date();
  db.shifts = [];
  let shid = 1;
  for (let off = -7; off <= 14; off++) {
    const d = new Date(today); d.setDate(d.getDate() + off);
    const ds = d.toISOString().slice(0,10);
    db.staff.filter(s => s.id !== 'owner').forEach(s => {
      const seed = (s.id.charCodeAt(1) + d.getDay()) % 7;
      if (seed < 2) return;
      const isEsthe = s.storeId === 's3';
      db.shifts.push({
        id: 'sh' + (shid++), staffId: s.id, date: ds,
        startHour: isEsthe ? (11 + (seed%3)) : (20 + (seed%2)),
        endHour:   isEsthe ? (19 + (seed%3)) : (20 + (seed%2) + 5 + (seed%2)),
      });
    });
  }
  save();
}
function save() { localStorage.setItem(KEY, JSON.stringify(db)); }
function resetData() { localStorage.removeItem(KEY); db = seed(); save(); }

/* ============ HELPERS ============ */
const yen = n => '¥' + Math.round(n).toLocaleString();
const pad = n => String(n).padStart(2,'0');
const fmtTime = d => pad(d.getHours()) + ':' + pad(d.getMinutes());
const fmtDateLong = d => `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;
const dowNames = ['日','月','火','水','木','金','土'];
const todayISO = () => new Date().toISOString().slice(0,10);
const thisMonth = () => new Date().toISOString().slice(0,7);
const staffById = id => db.staff.find(s => s.id === id);
const storeById = id => db.stores.find(s => s.id === id);
const activePunch = sid => db.punches.find(p => p.staffId === sid && !p.clockOut);

function calcMonth(staffId, ymStr) {
  const s = staffById(staffId);
  const store = storeById(s.storeId);
  const punches = db.punches.filter(p => p.staffId === staffId && p.clockIn.slice(0,7) === ymStr && p.clockOut);
  let hours = 0;
  let saturdayCount = 0;
  const saturdaySet = new Set();
  punches.forEach(p => {
    const ci = new Date(p.clockIn), co = new Date(p.clockOut);
    hours += (co - ci) / 3600000;
    if (ci.getDay() === 6) saturdaySet.add(ci.toISOString().slice(0,10));
  });
  saturdayCount = saturdaySet.size;
  const base = hours * s.wage;

  /* 手当の集計 */
  const allowances = []; // { key, label, amount }
  if (store && store.on) {
    Object.keys(ALLOWANCE_DEFS).forEach(key => {
      if (!store.on[key]) return;
      const def = ALLOWANCE_DEFS[key];
      let amount = 0;
      if (def.kind === 'auto' && key === 'saturday') {
        amount = saturdayCount * (store.rate?.saturday || 0);
      } else {
        amount = db.allowanceEntries
          .filter(e => e.staffId === staffId && e.type === key && e.date.slice(0,7) === ymStr)
          .reduce((sum, e) => sum + e.amount, 0);
      }
      if (amount > 0) allowances.push({ key, label: def.label, amount, ...(key === 'saturday' ? { detail: `${saturdayCount}回 × ¥${(store.rate?.saturday || 0).toLocaleString()}` } : {}) });
    });
  }
  const allowanceTotal = allowances.reduce((sum, a) => sum + a.amount, 0);

  const adv = db.advances
    .filter(a => a.staffId === staffId && a.status === 'approved' && a.at.slice(0,7) === ymStr)
    .reduce((sum, a) => sum + a.amount, 0);

  const gross = base + allowanceTotal;
  const net = gross - adv;
  return { hours, days: punches.length, base, allowances, allowanceTotal, gross, adv, net, saturdayCount };
}

function toast(msg) {

}
function modal(html) {
  document.getElementById('modal-host').innerHTML = `<div class="modal-bg" data-mclose><div class="modal">${html}</div></div>`;
  document.querySelector('[data-mclose]').onclick = e => { if (e.target.hasAttribute('data-mclose')) closeModal(); };
  bind();
}
function closeModal() { document.getElementById('modal-host').innerHTML = ''; }

function render() {

  const me = staffById(session.userId);
  const role = me && me.id === 'owner' ? 'owner' : 'staff';

  let body = '';
  const v = session.view;
  if (role === 'owner') {

  } else {

    else body = viewStaffHome(me);
  }

  const isHome = !v || v === 'home';
  app.innerHTML = `

      </div>

  `;
  bind();
}

                  <div class="info" data-act="go" data-v="payslip" data-uid="${s.id}" style="cursor:pointer">

                    <div class="mt">${m.hours.toFixed(1)}h${m.allowanceTotal ? ' ・ 手当 '+yen(m.allowanceTotal) : ''}${m.adv ? ' ・ 前借 '+yen(m.adv) : ''}${paid ? ' ・ '+fmtDateLong(new Date(getPaidAt(s.id, ym))) : ''}</div>
                  </div>
                  <div class="amt-col"><div class="am">${yen(m.net)}</div></div>
                  <button class="check ${paid?'paid':''}" data-act="togglePaid" data-uid="${s.id}" data-amt="${Math.round(m.net)}">${paid?'✓':''}</button>
                </div>
              `;
            }).join('')}
          `;
        }).join('')}
      </div>

      <button class="btn" data-act="print">支給リストを印刷 / PDF</button>
      <button class="btn ghost" data-act="line">明細をLINEで送る</button>
      <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:10px">行をタップ＝明細 ・ 〇タップ＝「渡した」記録</div>

      <hr>
      <button class="btn ghost" data-act="go" data-v="allowanceSettings">手当の設定（店舗ごと）</button>
    </div>
  `;
}

/* ============ Payslip detail ============ */
function viewPayslip() {
  const ym = thisMonth();
  const uid = session.params?.uid;
  const s = staffById(uid);
  if (!s) return '<div class="page"><div class="empty">スタッフが見つかりません</div></div>';
  const store = storeById(s.storeId);
  const m = calcMonth(uid, ym);
  const paid = isPaid(uid, ym);

  return `
    <div class="page">
      <h1>${s.name}さん の明細</h1>
      <div class="lead">${store.name} ・ ${ym}</div>

      <div class="hero">
        <div class="lbl">支給額</div>
        <div class="big">${yen(m.net)}</div>
        <div class="sub">${paid ? '受け渡し済 ・ '+fmtDateLong(new Date(getPaidAt(uid, ym))) : 'まだ渡していません'}</div>
      </div>

      <div class="card">
        <div class="row">
          <div><div class="name">時間給</div><div class="meta">${m.hours.toFixed(1)}h × ¥${s.wage.toLocaleString()}</div></div>
          <div class="amt">${yen(m.base)}</div>
        </div>
        ${m.allowances.map(a => `
          <div class="row">
            <div><div class="name">${a.label}</div>${a.detail ? `<div class="meta">${a.detail}</div>` : ''}</div>
            <div class="amt">${yen(a.amount)}</div>
          </div>
        `).join('')}
        <div class="row" style="background:var(--honey-light);margin:6px -16px -16px;padding:14px 16px;border-radius:0 0 16px 16px">
          <div class="name">小計</div>
          <div class="amt">${yen(m.gross)}</div>
        </div>
      </div>

      ${m.adv > 0 ? `<div class="card">
        <div class="row" style="color:var(--bad)">
          <div><div class="name">前借り相殺</div></div>
          <div class="amt">− ${yen(m.adv)}</div>
        </div>
        <div class="row" style="font-size:17px;font-weight:800">
          <div>差引支給額</div>
          <div style="color:var(--honey-deep)">${yen(m.net)}</div>
        </div>
      </div>` : ''}

      <button class="btn" data-act="addAllowance" data-uid="${uid}">＋ 手当を追加</button>
      <button class="btn ghost" data-act="print">この明細を印刷 / PDF</button>
    </div>
  `;
}

/* ============ Allowance settings ============ */
function viewAllowanceSettings() {
  const storeId = session.params?.storeId || db.stores[0].id;
  const store = storeById(storeId);

  return `
    <div class="page">
      <h1>手当の設定</h1>
      <div class="lead">店舗ごとに使う手当を選べます</div>

      <div class="store-pills">
        ${db.stores.map(s => `<button class="pill ${storeId===s.id?'on':''}" data-act="setStore" data-s="${s.id}">${s.name}</button>`).join('')}
      </div>

      <div class="card">
        ${Object.entries(ALLOWANCE_DEFS).map(([k, def]) => {
          const on = store.on[k];
          const isAuto = def.kind === 'auto';
          return `
            <div style="padding:14px 0;border-bottom:1px solid var(--line)">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <div>
                  <div style="font-weight:700">${def.label}</div>
                  <div style="font-size:11px;color:var(--muted);margin-top:2px">${isAuto ? '自動計算（土曜の出勤回数 × 単価）' : '都度入力'}</div>
                </div>
                <button class="check ${on?'paid':''}" data-act="toggleAllowance" data-store="${storeId}" data-key="${k}">${on?'✓':''}</button>
              </div>
              ${isAuto && on ? `
                <div style="margin-top:10px;display:flex;align-items:center;gap:10px">
                  <span style="font-size:12px;color:var(--muted)">単価</span>
                  <input type="number" value="${store.rate?.saturday || 0}" data-act="setRate" data-store="${storeId}" data-key="${k}" style="width:120px;padding:8px">
                  <span style="font-size:12px;color:var(--muted)">円/回</span>
                </div>
              ` : ''}
            </div>
          `;
        }).join('')}
      </div>

      <div style="font-size:12px;color:var(--muted);margin-top:14px;line-height:1.6">
        💡 オフにすると明細から消えます<br>
        💡 「都度入力」は売上やイベントが発生した日に記録する手当<br>
        💡 「土曜日手当」は出勤データから自動で計算
      </div>
    </div>
  `;
}

function isPaid(staffId, ym) { return db.payouts.some(p => p.staffId===staffId && p.ym===ym); }
function getPaidAt(staffId, ym) { const p = db.payouts.find(p => p.staffId===staffId && p.ym===ym); return p?p.paidAt:null; }

/* ============ STAFF ============ */
function viewStaffHome(me) {
  const ym = thisMonth();
  const m = calcMonth(me.id, ym);
  const store = storeById(me.storeId);
  const active = activePunch(me.id);
  const payout = db.payouts.find(p => p.staffId === me.id && p.ym === ym);
  const unconfirmedAdv = db.advances.filter(a => a.staffId === me.id && a.status === 'approved' && !a.confirmed);

  return `
    <div class="page">
      <h1>こんにちは ${me.name}さん</h1>
      <div class="lead">${store.name}</div>

      ${active ? `<div class="card" style="background:linear-gradient(135deg,var(--ok),#247952);color:#fff;border:none">
        <div style="font-size:12px;opacity:0.8">勤務中</div>
        <div style="font-size:22px;font-weight:700;margin:6px 0">${fmtTime(new Date(active.clockIn))} 出勤</div>
        <div style="font-size:12px;opacity:0.8">経過 ${((Date.now() - new Date(active.clockIn))/3600000).toFixed(1)} 時間</div>
      </div>` : ''}

      ${payout && !payout.staffConfirmed ? `
        <div class="card" style="background:var(--honey-light);border-color:var(--honey)">
          <div style="font-size:12px;color:var(--honey-deep);font-weight:600">📩 オーナーから給与が渡されました</div>
          <div style="font-size:24px;font-weight:800;margin:8px 0">${yen(payout.amount)}</div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:12px">${fmtDateLong(new Date(payout.paidAt))} 受け渡し</div>
          <button class="btn" data-act="confirmPayout">受け取りました ✓</button>
        </div>
      ` : ''}

      ${unconfirmedAdv.map(a => `
        <div class="card" style="background:#fff8e8;border-color:var(--honey)">
          <div style="font-size:12px;color:var(--honey-deep);font-weight:600">💴 前借りが承認・現金渡し済</div>
          <div style="font-size:22px;font-weight:800;margin:8px 0">${yen(a.amount)}</div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:12px">${a.reason}</div>
          <button class="btn" data-act="confirmAdv" data-id="${a.id}">受け取りました ✓</button>
        </div>
      `).join('')}

      <div class="hero">
        <div class="lbl">今月の見込み</div>
        <div class="big">${yen(m.net)}</div>
        <div class="sub">${m.days}日 / ${m.hours.toFixed(1)}時間 ${m.adv ? '・ 前借 '+yen(m.adv) : ''}</div>
      </div>

      <button class="btn" data-act="go" data-v="myshifts">シフトを確認する</button>
      <button class="btn ghost" data-act="go" data-v="advance">前借りを申請する</button>
    </div>
  `;
}

function viewStaffAdvance(me) {
  const mine = db.advances.filter(a => a.staffId === me.id).sort((a,b) => new Date(b.at) - new Date(a.at));
  return `
    <div class="page">
      <h1>前借り</h1>
      <div class="lead">オーナーの承認が必要です</div>

      <div class="card">
        <label>金額</label>
        <input id="adv-a" type="number" placeholder="例: 30000" inputmode="numeric">
        <label>理由</label>
        <textarea id="adv-r" placeholder="例: 家賃支払いのため"></textarea>
        <button class="btn" data-act="submitAdv">申請する</button>
      </div>

      ${mine.length > 0 ? `
        <h2>これまでの申請</h2>
        <div class="card">${mine.map(a => `<div class="row">
          <div><div class="name">${yen(a.amount)}</div><div class="meta">${a.reason}</div></div>
          <span class="badge ${a.status==='approved'?'ok':a.status==='rejected'?'':'wait'}" style="${a.status==='rejected'?'background:#fadcd9;color:var(--bad)':''}">${a.status==='approved'?'承認':a.status==='rejected'?'却下':'待ち'}</span>
        </div>`).join('')}</div>
      ` : ''}
    </div>
  `;
}

/* ============ ACTIONS ============ */
function bind() {
  document.querySelectorAll('[data-act]').forEach(el => {
    el.onclick = e => { e.stopPropagation(); handle(el.dataset.act, el.dataset, el); };
  });
  const kss = document.getElementById('ks-store');
  if (kss) kss.onchange = () => { session.params.storeId = kss.value; setSession(session); render(); };
  document.querySelectorAll('input[data-act="setRate"]').forEach(inp => {
    inp.onclick = e => e.stopPropagation();
    inp.onchange = () => {
      const st = storeById(inp.dataset.store);
      if (!st.rate) st.rate = {};
      st.rate[inp.dataset.key] = parseInt(inp.value) || 0;
      save(); toast('保存しました');
    };
  });
}

function handle(act, d, el) {
  console.log('[action]', act, d);
  try {
  switch (act) {
    case 'loginOwner':
      closeModal();
      setSession({ userId: 'owner', view: 'home', params: {} });
      render(); break;
    case 'pickStaff':
      modal(`<h3>誰でログインする？</h3>` + db.staff.filter(s=>s.id!=='owner').map(s => `
        <div class="picker" data-act="login" data-uid="${s.id}">
          <div class="who-info"><div class="nm">${s.name}</div><div class="mt">${storeById(s.storeId).name}</div></div><div>›</div>
        </div>`).join(''));
      break;
    case 'login':
      closeModal();
      setSession({ userId: d.uid, view: 'home', params: {} });
      render(); break;
    case 'openKiosk':
      setSession({ userId: null, view: 'kiosk', params: { storeId: db.stores[0].id } });
      render(); break;
    case 'logout':
      stopClock(); closeModal(); logout(); break;
    case 'switch':
      modal(`<h3>切り替え（デモ）</h3>
        <div class="picker" data-act="toLogin" style="background:var(--honey-light);border-color:var(--honey)"><div class="who-info"><div class="nm">🏠 ログイン画面に戻る</div><div class="mt">最初の3つの選択肢に戻る</div></div><div>›</div></div>
        <div class="picker" data-act="loginOwner"><div class="who-info"><div class="nm">👑 オーナー</div></div><div>›</div></div>
        ${db.staff.filter(s=>s.id!=='owner').map(s => `<div class="picker" data-act="login" data-uid="${s.id}">
          <div class="who-info"><div class="nm">${s.name}</div><div class="mt">${storeById(s.storeId).name}</div></div><div>›</div>
        </div>`).join('')}
      `);
      break;
    case 'toLogin':
      closeModal(); stopClock(); logout(); break;
    case 'back':
      session.view = 'home'; session.params = {}; setSession(session); render(); break;
    case 'go':
      session.view = d.v;
      if (d.uid) { if(!session.params) session.params={}; session.params.uid = d.uid; }
      setSession(session); render(); break;
    case 'setStore':
      if (!session.params) session.params = {};
      session.params.storeId = d.s; setSession(session); render(); break;
    case 'reset':
      if (confirm('全データを初期化します。よろしいですか？')) { resetData(); toast('初期化しました'); }
      break;

    /* kiosk */
    case 'tap': {
      const sid = session.params.storeId;
      const candidates = db.staff.filter(s => s.storeId === sid);
      modal(`<h3>📱 タッチされたカード</h3>
        <div style="font-size:12px;color:var(--muted);margin-bottom:12px">（デモなので選んでください）</div>
        ${candidates.map(s => `<div class="picker" data-act="punch" data-sid="${s.id}">
          <div class="who-info"><div class="nm">${s.name}</div></div><div>›</div>
        </div>`).join('')}`);
      break;
    }
    case 'punch': {
      closeModal();
      const sid = d.sid;
      const storeId = session.params.storeId;
      const active = activePunch(sid);
      let punch, action;
      if (active) { active.clockOut = new Date().toISOString(); punch = active; action = 'out'; }
      else { punch = { id:'p'+Date.now(), staffId: sid, storeId, clockIn: new Date().toISOString(), clockOut: null }; db.punches.push(punch); action = 'in'; }
      save();
      session.view = 'kioskDone';
      session.params = { staffId: sid, action, punch, storeId };
      setSession(session);
      render();
      setTimeout(() => {
        if (session && session.view === 'kioskDone') {
          session.view = 'kiosk'; session.params = { storeId }; setSession(session);
          render(); startClock();
        }
      }, 6000);
      break;
    }

    /* approval */
    case 'adv': {
      const a = db.advances.find(x => x.id === d.id);
      if (d.do === 'approve') {
        a.status = 'approved';
        a.handedOver = true;
        a.confirmed = false;
        a.at = new Date().toISOString();
        toast('承認・現金渡しを記録しました');
      } else {
        a.status = 'rejected';
        toast('却下しました');
      }
      save(); render(); break;
    }

    /* cash payment */
    case 'togglePaid': {
      const ym = thisMonth();
      const idx = db.payouts.findIndex(p => p.staffId === d.uid && p.ym === ym);
      if (idx >= 0) {
        db.payouts.splice(idx, 1);
        toast('受け渡し記録を取り消しました');
      } else {
        db.payouts.push({ id:'po'+Date.now(), staffId: d.uid, ym, amount: parseInt(d.amt), paidAt: new Date().toISOString(), staffConfirmed: false });
        toast('「渡した」を記録');
      }
      save(); render(); break;
    }
    case 'confirmPayout': {
      const ym = thisMonth();
      const p = db.payouts.find(p => p.staffId === session.userId && p.ym === ym);
      if (p) { p.staffConfirmed = true; save(); toast('受け取り確認しました'); render(); }
      break;
    }
    case 'confirmAdv': {
      const a = db.advances.find(x => x.id === d.id);
      if (a) { a.confirmed = true; save(); toast('受け取り確認しました'); render(); }
      break;
    }
    case 'print':
      window.print(); break;

    /* shifts */
    case 'weekOff':
      if (!session.params) session.params = {};
      session.params.weekOff = (session.params.weekOff || 0) + parseInt(d.d);
      setSession(session); render(); break;
    case 'editShift': {
      const ex = db.shifts.find(x => x.staffId === d.uid && x.date === d.date);
      const s = staffById(d.uid);
      const isEsthe = s.storeId === 's3';
      modal(`<h3>${s.name} ・ ${d.date}</h3>
        <label>開始 (時)</label><input id="sh-st" type="number" value="${ex ? ex.startHour : (isEsthe?11:21)}" min="0" max="29">
        <label>終了 (時)</label><input id="sh-en" type="number" value="${ex ? ex.endHour : (isEsthe?20:26)}" min="0" max="29">
        <div style="font-size:11px;color:var(--muted);margin:6px 0">26=翌2:00, 27=翌3:00…</div>
        <button class="btn" data-act="saveShift" data-uid="${d.uid}" data-date="${d.date}">保存</button>
        ${ex ? `<button class="btn danger" data-act="delShift" data-id="${ex.id}">このシフトを削除</button>` : ''}
      `);
      break;
    }
    case 'saveShift': {
      const st = parseInt(document.getElementById('sh-st').value);
      const en = parseInt(document.getElementById('sh-en').value);
      const ex = db.shifts.find(x => x.staffId === d.uid && x.date === d.date);
      if (ex) { ex.startHour = st; ex.endHour = en; }
      else db.shifts.push({ id:'sh'+Date.now(), staffId: d.uid, date: d.date, startHour: st, endHour: en });
      save(); closeModal(); toast('保存しました'); render(); break;
    }
    case 'delShift':
      db.shifts = db.shifts.filter(s => s.id !== d.id);
      save(); closeModal(); toast('削除しました'); render(); break;
    case 'copyPrev': {
      if (!confirm('前週のシフトを今表示中の週にコピーします。よろしいですか？')) return;
      const offset = session.params?.weekOff || 0;
      const today2 = new Date();
      const sun = new Date(today2); sun.setDate(sun.getDate() - today2.getDay() + offset * 7);
      const prevSun = new Date(sun); prevSun.setDate(prevSun.getDate() - 7);
      const staffList = db.staff.filter(s => s.storeId === d.store);
      let copied = 0;
      for (let i = 0; i < 7; i++) {
        const prev = new Date(prevSun); prev.setDate(prev.getDate()+i);
        const next = new Date(sun); next.setDate(next.getDate()+i);
        const prevStr = prev.toISOString().slice(0,10);
        const nextStr = next.toISOString().slice(0,10);
        staffList.forEach(s => {
          const p = db.shifts.find(x => x.staffId === s.id && x.date === prevStr);
          const exists = db.shifts.find(x => x.staffId === s.id && x.date === nextStr);
          if (p && !exists) {
            db.shifts.push({ id:'sh'+Date.now()+Math.random(), staffId:s.id, date:nextStr, startHour:p.startHour, endHour:p.endHour });
            copied++;
          }
        });
      }
      save(); toast(`${copied}件コピーしました`); render(); break;
    }
    case 'confirmShifts':
      toast('LINEで全員に通知しました (デモ)'); break;

    /* 手当 */
    case 'addAllowance': {
      const s = staffById(d.uid);
      const store = storeById(s.storeId);
      const available = Object.entries(ALLOWANCE_DEFS).filter(([k, def]) => store.on[k] && def.kind === 'manual');
      if (available.length === 0) { toast('この店舗で使える手当がありません'); return; }
      modal(`<h3>${s.name}さんに手当を追加</h3>
        <label>種類</label>
        <select id="al-type">${available.map(([k, def]) => `<option value="${k}">${def.label}</option>`).join('')}</select>
        <label>金額</label>
        <input id="al-amt" type="number" placeholder="例: 5000" inputmode="numeric">
        <label>日付</label>
        <input id="al-date" type="date" value="${todayISO()}">
        <button class="btn" data-act="saveAllowance" data-uid="${d.uid}">追加</button>
      `);
      break;
    }
    case 'saveAllowance': {
      const type = document.getElementById('al-type').value;
      const amt = parseInt(document.getElementById('al-amt').value);
      const date = document.getElementById('al-date').value;
      if (!amt || !date) { toast('金額と日付を入力'); return; }
      db.allowanceEntries.push({ id:'al'+Date.now(), staffId: d.uid, type, amount: amt, date });
      save(); closeModal(); toast('追加しました'); render(); break;
    }
    case 'toggleAllowance': {
      const store = storeById(d.store);
      store.on[d.key] = !store.on[d.key];
      save(); render();
      break;
    }
    case 'setRate':
      // handled via input change below
      break;

    /* advance request */
    case 'submitAdv': {
      const amt = parseInt(document.getElementById('adv-a').value);
      const r = document.getElementById('adv-r').value.trim();
      if (!amt || amt <= 0) { toast('金額を正しく入力してください'); return; }
      if (amt > 500000) { toast('上限¥500,000以下にしてください'); return; }
      if (!r) { toast('理由を入力してください'); return; }
      db.advances.push({ id:'a'+Date.now(), staffId: session.userId, amount: amt, reason: r, status:'pending', at: new Date().toISOString() });
      save(); toast('オーナーに送りました'); session.view = 'home'; setSession(session); render();
      break;
    }

    /* CSV */
    case 'line':
      toast('LINEで一括送信しました (デモ)'); break;
  }
  } catch (err) {
    console.error('[handle ERROR]', act, err);
    alert('エラー: ' + err.message + '\n\nアクション: ' + act + '\n\n（このメッセージのスクショを送ってください）');
  }
}

/* ============ CLOCK ============ */
let clockT = null;
function startClock() { stopClock(); clockT = setInterval(() => { const el = document.getElementById('clk'); if (el) el.textContent = fmtTime(new Date()); }, 1000); }
function stopClock() { if (clockT) { clearInterval(clockT); clockT = null; } }

if (session && session.view === 'kiosk') startClock();

/* db owner sentinel */
if (!staffById('owner')) {
  db.staff.unshift({ id: 'owner', name: 'オーナー', storeId: null, wage: 0 });
  save();
}

render();
</script>

</html>
